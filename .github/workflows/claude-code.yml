name: Claude Code Analysis

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  issue_comment:
    types: [created]

jobs:
  claude-analysis:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' ||
      (github.event.issue.pull_request && contains(github.event.comment.body, '@claude review'))
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Switch to PR branch (if triggered by comment)
        if: github.event_name == 'issue_comment'
        run: gh pr checkout ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code CLI
        env:
          ANTHROPIC_BASE_URL: https://api.minimax.io/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          TERM=dumb claude --model claude-3-5-sonnet-20241022 -p "Review code of the last commit or PR changes and identify any potential bugs or security issues" \
                 --allowedTools "Read,GrepTool" --dangerously-skip-permissions > review_raw.md

      - name: Clean ANSI Codes
        run: |
          node -e "
          const fs = require('fs');
          const raw = fs.readFileSync('review_raw.md', 'utf8');
          const clean = raw.replace(/[\u001b\u009b][[()#;?]*(?:[0-9]{1,4}(?:;[0-9]{0,4})*)?[0-9A-ORZcf-nqry=><]/g, '');
          fs.writeFileSync('review.md', clean);
          "

      - name: Post Review Comment
        if: github.event_name == 'pull_request' || github.event_name == 'issue_comment'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number || github.event.issue.number }}
          gh pr comment $PR_NUMBER --body-file review.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

