name: Claude Code Analysis

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  claude-analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code CLI
        env:
          ANTHROPIC_BASE_URL: https://api.minimax.chat/v1/adapters/anthropic
          ANTHROPIC_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          claude --model claude-3-5-sonnet-20241022 -p "Review code of the last commit or PR changes and identify any potential bugs or security issues" \
                 --allowedTools "Read,GrepTool"
