info:
  contact: {}
  description: API Server for SWD392 Chatbot RAG system.
  title: SWD392 Chatbot RAG API
  version: "1.0"
paths:
  /api/admin/audit-logs:
    get:
      description: Get system audit logs with pagination (Admin only)
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/auditlog.AuditLog'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get audit logs
      tags:
      - admin
  /api/admin/document-sources:
    post:
      consumes:
      - application/json
      description: Add a new document source (Admin only)
      parameters:
      - description: Source details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.DocumentSourceInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/application.DocumentSourceDto'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create document source
      tags:
      - admin-metadata
  /api/admin/document-sources/{id}:
    delete:
      description: Remove document source by ID (Admin only)
      parameters:
      - description: Source ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
