          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete document source
      tags:
      - admin-metadata
    put:
      consumes:
      - application/json
      description: Update source name by ID (Admin only)
      parameters:
      - description: Source ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Source details
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.DocumentSourceInput'
      produces:
